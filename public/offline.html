<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline | OzVFY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff7ed;
      color: #1f2937;
      padding: 2rem;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
      .card { background: #1f2937; border-color: #374151; }
      .subtitle { color: #9ca3af; }
    }
    .logo {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #ffedd5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; }
    .subtitle { color: #6b7280; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: #f97316;
      color: white;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #ea6c00; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">OzVFY</div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p class="subtitle">Check your connection and try again. Your saved deals are still available.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
