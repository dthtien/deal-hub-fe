<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply dark mode before React mounts to prevent flash
      (function() {
        var saved = localStorage.getItem('ozvfy_dark_mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'true' || (saved === null && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>OzVFY – Best Deals in Australia | Save on Fashion, Electronics & More</title>
    <meta name="description" content="Discover the best deals across Australia's top stores – ASOS, Culture Kings, JD Sports, Myer, Nike, The Iconic and more. Save big every day on fashion, electronics and lifestyle." />
    <meta name="keywords" content="australia deals, discount fashion, sale australia, ASOS sale, Culture Kings sale, Myer sale, Nike sale, The Iconic sale, cheap clothes australia" />
    <link rel="canonical" href="https://www.ozvfy.com/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ozvfy.com/" />
    <meta property="og:title" content="OzVFY – Best Deals in Australia" />
    <meta property="og:description" content="Discover the best deals from ASOS, Culture Kings, Myer, Nike and more. Updated daily." />
    <meta property="og:image" content="https://www.ozvfy.com/og-image.jpg" />
    <meta property="og:site_name" content="OzVFY" />
    <meta property="og:locale" content="en_AU" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ozvfy" />
    <meta name="twitter:title" content="OzVFY – Best Deals in Australia" />
    <meta name="twitter:description" content="Discover the best deals from ASOS, Culture Kings, Myer, Nike and more. Updated daily." />
    <meta name="twitter:image" content="https://www.ozvfy.com/og-image.jpg" />

    <!-- Structured Data (Google Rich Results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OzVFY",
      "url": "https://www.ozvfy.com",
      "description": "Australia's best deals aggregator for fashion, electronics and lifestyle",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.ozvfy.com/?query={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Commission Factory Verification -->
    <meta name="commission-factory-verification" content="178efdd2d7d34cc4a1ebb7d3529563ac" />

    <!-- Bing Webmaster Verification -->
    <meta name="msvalidate.01" content="3E30671E323D83C1E1FEE2698192F587" />

    <!-- Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="101f90e6-2296-44dd-aa04-1536cb250ee6"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
